<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride Booking</title>

    <!-- Tailwind Play CDN (dev only, will switch for production) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <!-- Navbar -->
    <nav class="bg-white shadow p-4">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <a href="/" class="text-xl font-bold">TransportPro</a>
        <a href="/book/" class="text-blue-600 font-semibold">Book a Ride</a>
      </div>
    </nav>

    <!-- Hero Section (optional for homepage) -->
    {% if request.path == "/" %}
    <section class="bg-blue-600 text-white py-20 text-center">
      <h1 class="text-4xl font-bold mb-4">Fast & Reliable Transportation</h1>
      <p class="text-lg opacity-90 mb-6">
        Book your trip in seconds — simple, clean, and stress-free.
      </p>
      <a
        href="/book/"
        class="px-6 py-3 bg-white text-blue-700 rounded font-medium shadow"
      >
        Book a Ride
      </a>
    </section>
    {% endif %}

    <!-- Main Content -->
    <main class="py-10 px-4">{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer class="text-center p-4 text-sm text-gray-500">
      © {{ now|default:"2026" }} TransportPro — All Rights Reserved
    </footer>
  </body>
</html>
